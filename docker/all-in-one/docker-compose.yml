name: englishread

services:
  app:
    image: englishread-all-in-one:latest
    container_name: englishread
    ports:
      - "8888:80"
    # 加载 .env 文件中的环境变量
    env_file:
      - ../../backend/.env
    volumes:
      # 持久化数据库
      - ./backend/data.db:/app/data.db
      # 词典数据目录
      - ./backend/data:/app/data
      # 书籍目录
      - ./backend/Books:/app/Books
    # 仅覆盖 .env 中需要运行时动态设置的值
    environment:
      - DEBUG=False
      - IS_PRODUCTION=True
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/v1/dictionary/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
