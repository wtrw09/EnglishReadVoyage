server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 设置最大上传文件大小（500MB）
    client_max_body_size 500M;

    # 启用 gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;  # 代理请求也压缩
    gzip_comp_level 5;  # 压缩级别 1-9，默认 4
    gzip_buffers 16 8k;  # 压缩缓冲区
    
    # 压缩类型（增强版）
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        text/javascript 
        application/javascript 
        application/xml+rss 
        application/json
        application/xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        font/ttf
        font/eot
        font/otf
        image/svg+xml
        image/x-icon;

    # API 反向代理 - 将 /api 请求转发到本地后端服务
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 书籍静态资源代理 - 将 /books 请求转发到本地后端
    location /books/ {
        proxy_pass http://127.0.0.1:8000/books/;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # 单词发音音频缓存代理 - 将 /audio 请求转发到本地后端
    location /audio/ {
        proxy_pass http://127.0.0.1:8000/audio/;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, must-revalidate";
    }

    # 前端路由支持（Vue Router 的 history 模式）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 缓存静态资源（排除 /books/ 路径，因为需要代理到后端）
    location ~* ^/(?!books/).+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
