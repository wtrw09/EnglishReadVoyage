name: englishread

services:
  # 后端服务
  backend:
    image: englishread-backend:latest
    container_name: englishread-backend
    # 端口不暴露到宿主机，仅供内部前端服务访问
    expose:
      - "8000"
    volumes:
      # 持久化数据库（运行目录下需创建 backend/data.db）
      - ./backend/data.db:/app/data.db
      # 词典数据目录
      - ./backend/data:/app/data
      # 书籍目录（运行目录下需创建 backend/Books 文件夹）
      - ./backend/Books:/app/Books
    environment:
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8000
      - CORS_ORIGINS=["*"]
      - SECRET_KEY=your-secret-key-change-in-production
      - ACCESS_TOKEN_EXPIRE_MINUTES=3000
      - KOKORO_API_URL=http://localhost:8880/v1/audio/speech
      - KOKORO_DEFAULT_VOICE=bf_v0isabella
      - KOKORO_DEFAULT_SPEED=1.0
    restart: unless-stopped
    networks:
      - englishread-network

  # 前端服务
  frontend:
    image: englishread-frontend:latest
    container_name: englishread-frontend
    ports:
      - "8888:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - englishread-network

networks:
  englishread-network:
    driver: bridge